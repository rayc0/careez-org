<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareEZ API Status</title>
  <!-- ─── Favicon & PWA ─── -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="msapplication-TileImage" content="/mstile-150.png">
  <meta name="msapplication-TileColor" content="#0a1428">
  <meta name="theme-color" content="#0a1428">
  <meta name="description" content="Live status of CareEZ AI API endpoints — IDDSI classification, image, voice, and audio screening." />
  <link rel="canonical" href="https://careez.org/status/" />
  <style>
    :root {
      --navy:    #0A1428;
      --navy2:   #0E1C3A;
      --navy3:   #132046;
      --cyan:    #00D4FF;
      --white:   #FFFFFF;
      --gray:    #8899AA;
      --green:   #22C55E;
      --yellow:  #EAB308;
      --red:     #EF4444;
      --card-bg: #0E1C3A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
    }
    nav {
      background: rgba(10,20,40,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,212,255,0.15);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      color: var(--white);
      letter-spacing: 0.02em;
    }
    .nav-brand span { color: var(--cyan); }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .nav-links a {
      color: var(--gray);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--white); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page-header h1 span { color: var(--cyan); }
    .page-header p {
      color: var(--gray);
      font-size: 15px;
    }
    .overall-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 32px;
      font-weight: 600;
      font-size: 16px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .overall-banner .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .overall-banner .sub { font-size: 13px; font-weight: 400; color: var(--gray); margin-left: auto; }

    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }
    @media (max-width: 640px) { .cards-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 22px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(0,212,255,0.3); }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 10px;
    }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-icon { font-size: 22px; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .badge-up   { background: rgba(34,197,94,0.12);  color: var(--green);  border: 1px solid rgba(34,197,94,0.25); }
    .badge-slow { background: rgba(234,179,8,0.12);  color: var(--yellow); border: 1px solid rgba(234,179,8,0.25); }
    .badge-down { background: rgba(239,68,68,0.12);  color: var(--red);    border: 1px solid rgba(239,68,68,0.25); }
    .badge-pending { background: rgba(136,153,170,0.12); color: var(--gray); border: 1px solid rgba(136,153,170,0.25); }
    .dot-up   { background: var(--green); }
    .dot-slow { background: var(--yellow); }
    .dot-down { background: var(--red); }
    .dot-pending { background: var(--gray); }

    .card-url {
      font-size: 11px;
      color: var(--gray);
      font-family: monospace;
      word-break: break-all;
      margin-bottom: 14px;
      opacity: 0.8;
    }
    .card-metrics {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .metric { flex: 1; }
    .metric-label { font-size: 11px; color: var(--gray); margin-bottom: 2px; }
    .metric-value { font-size: 18px; font-weight: 700; }
    .metric-value.latency-good { color: var(--green); }
    .metric-value.latency-slow { color: var(--yellow); }
    .metric-value.latency-na   { color: var(--gray); }

    .uptime-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 10px;
      height: 24px;
      align-items: flex-end;
    }
    .uptime-segment {
      flex: 1;
      border-radius: 2px;
      min-height: 8px;
      cursor: default;
      transition: opacity 0.2s;
    }
    .uptime-segment:hover { opacity: 0.7; }
    .seg-up   { background: var(--green);  height: 24px; }
    .seg-slow { background: var(--yellow); height: 16px; }
    .seg-down { background: var(--red);    height: 8px; }
    .seg-none { background: rgba(136,153,170,0.2); height: 4px; }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--gray);
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn-test {
      background: transparent;
      border: 1px solid rgba(0,212,255,0.4);
      color: var(--cyan);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-test:hover { background: rgba(0,212,255,0.1); }
    .btn-test:disabled { opacity: 0.5; cursor: default; }

    .live-result {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      display: none;
      word-break: break-all;
      color: var(--gray);
      max-height: 80px;
      overflow-y: auto;
    }
    .live-result.visible { display: block; }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--gray);
    }
    .refresh-row span { color: var(--cyan); }

    footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--gray);
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    footer a { color: var(--cyan); text-decoration: none; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .checking { animation: pulse 1s infinite; }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">Care<span>EZ</span></a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/api-docs/">API Docs</a></li>
      <li><a href="/status/" style="color:var(--cyan);font-weight:600;">Status</a></li>
      <li><a href="/trial/" style="background:var(--cyan);color:var(--navy);font-weight:700;padding:5px 14px;border-radius:20px;font-size:12px;text-decoration:none;">Apply Pilot</a></li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Care<span>EZ</span> API Status</h1>
    <p>Live status of all CareEZ AI endpoints · Auto-refreshes every 30 seconds</p>
  </div>

  <div class="overall-banner" id="overall-banner">
    <div class="dot" id="overall-dot" style="background:var(--gray)"></div>
    <span id="overall-text">Checking all systems…</span>
    <span class="sub" id="overall-sub">—</span>
  </div>

  <div class="cards-grid" id="cards-grid">
    <!-- Cards injected by JS -->
  </div>

  <div class="refresh-row">
    Auto-refresh in <span id="countdown">30</span>s &nbsp;·&nbsp;
    <button class="btn-test" id="btn-refresh-all" onclick="refreshAll()">Refresh all now</button>
  </div>
</div>

<footer>
  <p>CareEZ is a product of <a href="https://careez.org/">Carewells Limited</a> · <a href="https://careez.org/api-docs/">API Documentation</a> · <a href="https://careez.org/changelog/">Changelog</a> · <a href="https://careez.org/">Home</a></p>
</footer>

<script>
'use strict';

const ENDPOINTS = [
  {
    id: 'text',
    name: 'IDDSI Text Classification',
    icon: '📝',
    url: 'https://www.seniordeli.com/api/iddsi-classify',
    method: 'POST',
    body: JSON.stringify({ text: 'status check' }),
    headers: { 'Content-Type': 'application/json' },
    slowMs: 3000,
  },
  {
    id: 'image',
    name: 'IDDSI Image Classification',
    icon: '🖼️',
    url: 'https://www.seniordeli.com/api/iddsi-classify-image',
    method: 'POST',
    body: JSON.stringify({ image_url: 'https://careez.org/og-image.png' }),
    headers: { 'Content-Type': 'application/json' },
    slowMs: 5000,
  },
  {
    id: 'voice',
    name: 'Voice Aspiration Screen',
    icon: '🎙️',
    url: 'https://www.seniordeli.com/api/voice-aspiration-screen',
    method: 'POST',
    body: JSON.stringify({ audio_url: '' }),
    headers: { 'Content-Type': 'application/json' },
    slowMs: 5000,
  },
  {
    id: 'audio',
    name: 'IDDSI Audio Classification',
    icon: '🔊',
    url: 'https://www.seniordeli.com/api/iddsi-classify-audio',
    method: 'POST',
    body: JSON.stringify({ audio_url: '' }),
    headers: { 'Content-Type': 'application/json' },
    slowMs: 5000,
  },
];

const HISTORY_KEY = 'careez_status_history_v2';
const HISTORY_MAX = 288; // 24h at 5-min intervals
const REFRESH_INTERVAL = 30; // seconds

let history = {};
let countdown = REFRESH_INTERVAL;
let countdownTimer = null;
let checkInProgress = false;

// ── History helpers ──────────────────────────────────────────────────────────
function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (raw) history = JSON.parse(raw);
  } catch(e) {}
  ENDPOINTS.forEach(ep => {
    if (!history[ep.id]) history[ep.id] = [];
  });
}

function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
}

function pushHistory(id, entry) {
  if (!history[id]) history[id] = [];
  history[id].push(entry);
  if (history[id].length > HISTORY_MAX) history[id].splice(0, history[id].length - HISTORY_MAX);
  saveHistory();
}

// ── Uptime calc ──────────────────────────────────────────────────────────────
function calcUptime(id) {
  const h = history[id] || [];
  if (!h.length) return null;
  const up = h.filter(e => e.status === 'up' || e.status === 'slow').length;
  return Math.round((up / h.length) * 1000) / 10;
}

// ── Ping one endpoint ────────────────────────────────────────────────────────
async function pingEndpoint(ep) {
  const start = Date.now();
  let status = 'down';
  let latency = null;
  let detail = '';

  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(ep.url, {
      method: ep.method,
      headers: ep.headers,
      body: ep.body,
      signal: ctrl.signal,
      mode: 'cors',
    });
    clearTimeout(timeout);
    latency = Date.now() - start;
    // Any HTTP response (even 4xx) means the server is reachable
    if (res.ok || res.status < 500) {
      status = latency > ep.slowMs ? 'slow' : 'up';
      detail = `HTTP ${res.status}`;
      // Try to read a snippet
      try {
        const text = await res.text();
        detail = `HTTP ${res.status} · ${text.substring(0, 60).replace(/\n/g,' ')}`;
      } catch(e) {}
    } else {
      status = 'down';
      detail = `HTTP ${res.status}`;
    }
  } catch(err) {
    latency = Date.now() - start;
    if (err.name === 'AbortError') {
      status = 'down';
      detail = 'Timeout (10s)';
    } else if (err.message && err.message.includes('NetworkError')) {
      // CORS block: server exists but denies browser CORS — treat as "up" (reachable)
      status = latency < ep.slowMs ? 'up' : 'slow';
      detail = 'CORS policy (server reachable)';
    } else if (err.message && (err.message.includes('Failed to fetch') || err.message.includes('Load failed'))) {
      // Could be CORS or truly down — mark as unknown/down
      status = 'down';
      detail = err.message.substring(0, 80);
    } else {
      status = 'down';
      detail = String(err).substring(0, 80);
    }
  }

  const entry = { ts: Date.now(), status, latency, detail };
  pushHistory(ep.id, entry);
  return entry;
}

// ── Render helpers ───────────────────────────────────────────────────────────
function statusLabel(s) {
  if (s === 'up')   return 'Operational';
  if (s === 'slow') return 'Degraded';
  if (s === 'down') return 'Outage';
  return 'Checking…';
}

function badgeClass(s) {
  if (s === 'up')   return 'badge-up';
  if (s === 'slow') return 'badge-slow';
  if (s === 'down') return 'badge-down';
  return 'badge-pending';
}

function dotClass(s) {
  if (s === 'up')   return 'dot-up';
  if (s === 'slow') return 'dot-slow';
  if (s === 'down') return 'dot-down';
  return 'dot-pending';
}

function latencyClass(ms) {
  if (!ms) return 'latency-na';
  return ms < 3000 ? 'latency-good' : 'latency-slow';
}

function latencyDisplay(ms) {
  if (!ms && ms !== 0) return '—';
  if (ms >= 1000) return (ms/1000).toFixed(1) + 's';
  return ms + 'ms';
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-HK', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function buildUptimeBar(id) {
  const h = (history[id] || []).slice(-48); // last 48 checks
  if (!h.length) {
    return '<div class="uptime-bar"><div class="uptime-segment seg-none" style="flex:1" title="No data yet"></div></div>';
  }
  const segments = h.map(e => {
    const t = fmtTime(e.ts);
    const cls = e.status === 'up' ? 'seg-up' : e.status === 'slow' ? 'seg-slow' : 'seg-down';
    return `<div class="uptime-segment ${cls}" title="${t} · ${statusLabel(e.status)} · ${latencyDisplay(e.latency)}"></div>`;
  }).join('');
  return `<div class="uptime-bar">${segments}</div>`;
}

// ── Render cards ─────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = ENDPOINTS.map(ep => {
    const h = history[ep.id] || [];
    const last = h.length ? h[h.length-1] : null;
    const s = last ? last.status : 'pending';
    const uptime = calcUptime(ep.id);
    const uptimeStr = uptime !== null ? uptime + '%' : '—';

    return `
<div class="card" id="card-${ep.id}">
  <div class="card-header">
    <div>
      <div class="card-title">${ep.icon} ${ep.name}</div>
    </div>
    <span class="status-badge ${badgeClass(s)}">
      <span class="dot ${dotClass(s)}"></span>
      ${statusLabel(s)}
    </span>
  </div>
  <div class="card-url">${ep.url}</div>
  <div class="card-metrics">
    <div class="metric">
      <div class="metric-label">Response Time</div>
      <div class="metric-value ${latencyClass(last?.latency)}">${latencyDisplay(last?.latency)}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Uptime (session)</div>
      <div class="metric-value" style="color:var(--cyan)">${uptimeStr}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Last Checked</div>
      <div class="metric-value latency-na" style="font-size:13px;padding-top:4px">${fmtTime(last?.ts)}</div>
    </div>
  </div>
  ${buildUptimeBar(ep.id)}
  <div class="card-footer">
    <span>${h.length} checks · ${h.length ? 'Last: ' + fmtTime(last.ts) : 'No data'}</span>
    <button class="btn-test" id="btn-${ep.id}" onclick="testLive('${ep.id}')">Test now</button>
  </div>
  <div class="live-result" id="live-${ep.id}"></div>
</div>`;
  }).join('');
}

// ── Update single card ───────────────────────────────────────────────────────
function updateCard(ep) {
  const h = history[ep.id] || [];
  const last = h.length ? h[h.length-1] : null;
  const s = last ? last.status : 'pending';
  const uptime = calcUptime(ep.id);
  const uptimeStr = uptime !== null ? uptime + '%' : '—';

  const card = document.getElementById(`card-${ep.id}`);
  if (!card) { renderCards(); return; }

  card.querySelector('.status-badge').className = `status-badge ${badgeClass(s)}`;
  card.querySelector('.status-badge .dot').className = `dot ${dotClass(s)}`;
  card.querySelector('.status-badge').childNodes[card.querySelector('.status-badge').childNodes.length-1].textContent = '\n      ' + statusLabel(s) + '\n    ';

  const metrics = card.querySelectorAll('.metric-value');
  metrics[0].textContent = latencyDisplay(last?.latency);
  metrics[0].className = `metric-value ${latencyClass(last?.latency)}`;
  metrics[1].textContent = uptimeStr;
  metrics[2].textContent = fmtTime(last?.ts);

  // Replace uptime bar
  const bar = card.querySelector('.uptime-bar');
  if (bar) bar.outerHTML = buildUptimeBar(ep.id);

  // Footer
  const footer = card.querySelector('.card-footer span');
  if (footer) footer.textContent = `${h.length} checks · ${h.length ? 'Last: ' + fmtTime(last.ts) : 'No data'}`;
}

// ── Update overall banner ────────────────────────────────────────────────────
function updateOverall() {
  const statuses = ENDPOINTS.map(ep => {
    const h = history[ep.id] || [];
    return h.length ? h[h.length-1].status : 'pending';
  });
  const dot = document.getElementById('overall-dot');
  const text = document.getElementById('overall-text');
  const sub = document.getElementById('overall-sub');

  const upCount = statuses.filter(s => s === 'up').length;
  const slowCount = statuses.filter(s => s === 'slow').length;
  const downCount = statuses.filter(s => s === 'down').length;
  const pendingCount = statuses.filter(s => s === 'pending').length;

  if (pendingCount === ENDPOINTS.length) {
    dot.style.background = 'var(--gray)';
    text.textContent = 'Checking all systems…';
    sub.textContent = '—';
  } else if (downCount > 0) {
    dot.style.background = 'var(--red)';
    text.textContent = `${downCount} endpoint${downCount > 1 ? 's' : ''} down`;
    sub.textContent = `${upCount} operational · ${slowCount} degraded`;
  } else if (slowCount > 0) {
    dot.style.background = 'var(--yellow)';
    text.textContent = 'Some systems degraded';
    sub.textContent = `${upCount} operational · ${slowCount} slow · ${downCount} down`;
  } else if (upCount === ENDPOINTS.length) {
    dot.style.background = 'var(--green)';
    text.textContent = 'All systems operational';
    sub.textContent = `${ENDPOINTS.length}/${ENDPOINTS.length} endpoints up`;
  } else {
    dot.style.background = 'var(--gray)';
    text.textContent = 'Partially operational';
    sub.textContent = `${upCount} up · ${slowCount} slow · ${downCount} down`;
  }
}

// ── Check all endpoints ───────────────────────────────────────────────────────
async function checkAll() {
  if (checkInProgress) return;
  checkInProgress = true;
  document.getElementById('btn-refresh-all').disabled = true;

  const promises = ENDPOINTS.map(async ep => {
    const card = document.getElementById(`card-${ep.id}`);
    if (card) {
      const badge = card.querySelector('.status-badge');
      badge.className = 'status-badge badge-pending checking';
    }
    const result = await pingEndpoint(ep);
    updateCard(ep);
    updateOverall();
    return result;
  });

  await Promise.all(promises);
  checkInProgress = false;
  document.getElementById('btn-refresh-all').disabled = false;
}

// ── "Test now" per card ───────────────────────────────────────────────────────
async function testLive(id) {
  const ep = ENDPOINTS.find(e => e.id === id);
  if (!ep) return;

  const btn = document.getElementById(`btn-${id}`);
  const liveDiv = document.getElementById(`live-${id}`);

  btn.disabled = true;
  btn.textContent = 'Testing…';
  liveDiv.className = 'live-result visible checking';
  liveDiv.textContent = 'Sending request…';

  const start = Date.now();
  let status = 'down';
  let detail = '';
  let latency = null;

  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 12000);
    const res = await fetch(ep.url, {
      method: ep.method,
      headers: ep.headers,
      body: ep.body,
      signal: ctrl.signal,
      mode: 'cors',
    });
    clearTimeout(timeout);
    latency = Date.now() - start;
    let body = '';
    try { body = await res.text(); } catch(e) {}
    status = (res.ok || res.status < 500) ? (latency > ep.slowMs ? 'slow' : 'up') : 'down';
    detail = `HTTP ${res.status} · ${latency}ms\n${body.substring(0, 200)}`;
  } catch(err) {
    latency = Date.now() - start;
    if (err.name === 'AbortError') {
      detail = `Timeout after ${latency}ms`;
    } else {
      detail = `${err.message || String(err)} (${latency}ms)`;
      // CORS block = server reachable
      if (err.message && (err.message.includes('NetworkError') || err.message.includes('Failed to fetch') || err.message.includes('Load failed'))) {
        detail += '\n\nNote: CORS policy blocked the browser request — the server is reachable but requires an authorized Origin header. This is expected for direct browser calls; use your backend or the API playground.';
        status = 'up';
      }
    }
  }

  const entry = { ts: Date.now(), status, latency, detail: detail.split('\n')[0] };
  pushHistory(ep.id, entry);
  updateCard(ep);
  updateOverall();

  liveDiv.className = 'live-result visible';
  liveDiv.textContent = detail;
  btn.textContent = 'Test now';
  btn.disabled = false;
}

// ── Refresh all wrapper ───────────────────────────────────────────────────────
function refreshAll() {
  resetCountdown();
  checkAll();
}

// ── Countdown timer ───────────────────────────────────────────────────────────
function resetCountdown() {
  countdown = REFRESH_INTERVAL;
  document.getElementById('countdown').textContent = countdown;
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = countdown;
    if (countdown <= 0) {
      resetCountdown();
      checkAll();
    }
  }, 1000);
}

// ── Fetch server-side data.json (GitHub Actions pings) ───────────────────────
async function fetchDataJson() {
  try {
    const res = await fetch('/status/data.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    if (!data.endpoints || data.generated === 'static-stub') return;

    // Merge server-side results into history
    let changed = false;
    ENDPOINTS.forEach(ep => {
      const srv = data.endpoints[ep.id];
      if (!srv || !srv.checked_at) return;
      const h = history[ep.id] || [];
      const ts = new Date(srv.checked_at).getTime();
      // Only add if this ts isn't already in history
      const already = h.some(e => Math.abs(e.ts - ts) < 10000);
      if (!already) {
        pushHistory(ep.id, {
          ts,
          status: srv.status,
          latency: srv.latency_ms,
          detail: `Server-side · HTTP ${srv.http_code}`,
        });
        changed = true;
      }
    });
    if (changed) {
      renderCards();
      updateOverall();
    }
  } catch(e) { /* silent */ }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadHistory();
renderCards();
updateOverall();
resetCountdown();
fetchDataJson(); // load last server-side result immediately
checkAll();      // then do live client-side check
</script>
