<!DOCTYPE html>
<!--
  CareEZ Social Card — Twitter / X (1600x900)
  To render: open in browser and screenshot, or use Chrome headless:
    google-chrome --headless=new --window-size=1600,900 --screenshot=out.png twitter-1600x900.html
  Customize: edit TITLE, SUBTITLE, BADGE1, BADGE2 below.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy:  #0A1428;
  --navy2: #0E1C3A;
  --navy3: #132046;
  --cyan:  #00E5FF;
  --cyan2: #29B6F6;
  --white: #FFFFFF;
  --gray:  #B0BEC5;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  width: 1600px; height: 900px;
  background: var(--navy);
  color: var(--white);
  overflow: hidden;
}
.card {
  width: 1600px; height: 900px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 100px 120px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, var(--navy3) 100%);
  position: relative;
}
.glow {
  position: absolute; top: -100px; right: -100px;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.logo {
  font-size: 80px; font-weight: 900; line-height: 1;
  margin-bottom: 36px; letter-spacing: -2px;
}
.care { color: var(--white); }
.ez   { color: var(--cyan); }
.accent-bar {
  width: 200px; height: 5px; border-radius: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--cyan2));
  margin-bottom: 48px;
}
/* ── CUSTOMIZABLE CONTENT ── */
.title {
  font-size: 52px; font-weight: 800; line-height: 1.2;
  color: var(--white); max-width: 1000px;
  margin-bottom: 24px;
}
.subtitle {
  font-size: 32px; font-weight: 400;
  color: var(--gray); max-width: 900px;
  margin-bottom: 60px; line-height: 1.45;
}
.meta { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.domain {
  color: var(--cyan); font-size: 28px; font-weight: 600;
  letter-spacing: 0.02em;
}
.badge {
  display: inline-block;
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.3);
  color: var(--cyan);
  border-radius: 24px;
  font-size: 22px; font-weight: 600;
  padding: 6px 20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="logo"><span class="care">Care</span><span class="ez">EZ</span></div>
  <div class="accent-bar"></div>

  <!-- EDIT BELOW -->
  <div class="title">Multimodal Clinical AI<br>for Dysphagia</div>
  <div class="subtitle">VFSS · FEES · Clinical NLP · Real-time analysis</div>
  <div class="meta">
    <span class="domain">careez.org</span>
    <span class="badge">Free Beta Access</span>
    <span class="badge">CE/FDA Pathway</span>
  </div>
  <!-- EDIT ABOVE -->
</div>
</body>
</html>
