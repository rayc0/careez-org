<!DOCTYPE html>
<!--
  CareEZ Social Card — WeChat Moments (1080x1080)
  Render: google-chrome --headless=new --window-size=1080,1080 --screenshot=out.png wechat-1080x1080.html
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #0A1428; --navy2: #0E1C3A; --navy3: #132046;
  --cyan: #00E5FF; --cyan2: #29B6F6;
  --white: #FFFFFF; --gray: #B0BEC5;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  width: 1080px; height: 1080px;
  background: var(--navy); color: var(--white); overflow: hidden;
}
.card {
  width: 1080px; height: 1080px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  padding: 80px;
  background: radial-gradient(ellipse at center, var(--navy2) 0%, var(--navy) 70%);
  position: relative;
}
.glow {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
.icon-wrap {
  width: 160px; height: 140px; margin: 0 auto 50px;
  border: 8px solid var(--cyan);
  border-right: none;
  border-radius: 16px 0 0 16px;
  display: flex; align-items: center; justify-content: center;
}
.check { font-size: 72px; color: var(--cyan); font-weight: 900; }
.logo { font-size: 100px; font-weight: 900; letter-spacing: -3px; margin-bottom: 28px; line-height: 1; }
.care { color: var(--white); }
.ez   { color: var(--cyan); }
.accent-bar {
  width: 220px; height: 6px; border-radius: 3px;
  background: linear-gradient(90deg, var(--cyan), var(--cyan2));
  margin: 0 auto 56px;
}
.title   { font-size: 42px; font-weight: 800; line-height: 1.4; margin-bottom: 20px; }
.subtitle { font-size: 28px; color: var(--gray); line-height: 1.5; margin-bottom: 56px; }
.badges  { display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; margin-bottom: 50px; }
.badge {
  background: rgba(0,229,255,0.1);
  border: 1px solid rgba(0,229,255,0.3);
  color: var(--cyan); border-radius: 24px;
  font-size: 26px; font-weight: 600;
  padding: 8px 24px;
}
.domain { color: var(--cyan); font-size: 32px; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="icon-wrap"><span class="check">✓</span></div>
  <div class="logo"><span class="care">Care</span><span class="ez">EZ</span></div>
  <div class="accent-bar"></div>
  <!-- EDIT BELOW -->
  <div class="title">Multimodal Clinical AI<br>for Dysphagia</div>
  <div class="subtitle">VFSS · FEES · Clinical NLP</div>
  <div class="badges">
    <span class="badge">AI-Powered</span>
    <span class="badge">Free Beta</span>
    <span class="badge">CE/FDA Path</span>
  </div>
  <div class="domain">careez.org</div>
  <!-- EDIT ABOVE -->
</div>
</body>
</html>
